<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f6f7" />
    <title>Medal Forge is offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f7;
        --panel: #ffffff;
        --line: #d9dde3;
        --text: #171a1f;
        --muted: #68707d;
        --accent: #276ef1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
        box-shadow: 0 18px 48px rgb(18 24 32 / 10%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        margin-top: 18px;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 13px;
        font-weight: 720;
        padding: 0 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Medal Forge is offline</h1>
      <p>
        The app shell is cached after an online visit. Reconnect once if this is
        the first time opening this page on the device.
      </p>
      <a href="/">Open workspace</a>
    </main>
  </body>
</html>
